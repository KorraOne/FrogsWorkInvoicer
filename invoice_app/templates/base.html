<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Invoice App{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        {% block back %}{% if show_back is not defined or show_back %}

        <a href="{{ back_url|default('/') }}" class="back-link">&larr; Back</a>

        {% endif %}{% endblock %}

        {% block content %}{% endblock %}

        {% if show_home|default(false) %}

        <a href="{{ url_for('home') }}" class="home-footer-link">Go to Home</a>

        {% endif %}

    </div>

    <script>

    (function () {

        setInterval(function () {

            fetch("{{ url_for('ping') }}", { method: "POST", keepalive: true }).catch(function () {});

        }, 30000);

    })();

    </script>

</body>

</html>
