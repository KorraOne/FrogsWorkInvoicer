<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#16a34a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <base href="/">
  <title>FrogsWork</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="app-header">
    <h1>FrogsWork</h1>
    <p id="sync-status" class="sync-status" hidden></p>
  </header>
  <main id="app" class="app-main">
    <section id="gate-screen" class="panel">
      <h2>Welcome</h2>
      <p id="gate-message" class="hint">Sign in with your Cloud subscription to use the mobile app.</p>
      <form id="gate-login-form" class="gate-login-form" novalidate>
        <div class="field">
          <label for="gate-email">Email</label>
          <input id="gate-email" name="email" type="email" autocomplete="username" inputmode="email">
        </div>
        <div class="field">
          <label for="gate-password">Password</label>
          <input id="gate-password" name="password" type="password" autocomplete="current-password">
        </div>
        <div class="btn-row">
          <button type="button" id="gate-login-submit" class="btn primary">Sign in</button>
        </div>
      </form>
      <p class="hint gate-subscribe">
        <a href="https://frogswork.com/account/forgot-password.html">Forgot password?</a>
        · <a id="sign-in-web-link" href="https://frogswork.com/account/login.html?next=pwa">Sign in on web</a>
      </p>
      <p class="hint gate-subscribe">
        Need a subscription? <a id="subscribe-link" href="https://frogswork.com/account/signup.html">Create account</a>
      </p>
      <button type="button" id="reset-session" class="btn ghost">Reset session</button>
    </section>
    <section id="upgrade-screen" class="panel upgrade-panel" hidden>
      <h2 id="upgrade-title">Upgrade to Cloud</h2>
      <p id="upgrade-signed-in" class="upgrade-signed-in"></p>
      <p id="upgrade-lead" class="hint"></p>
      <ul class="upgrade-list">
        <li><strong>Local</strong> — full app on desktop only</li>
        <li><strong>Cloud</strong> — desktop + this mobile app + cloud sync</li>
      </ul>
      <div class="btn-row">
        <a id="upgrade-cta" class="btn primary" href="https://frogswork.com/account/subscribe.html?upgrade=1&tier=cloud">Upgrade to Cloud</a>
        <a id="upgrade-portal" class="btn secondary" href="#" target="_blank" rel="noopener" hidden>Manage subscription</a>
      </div>
      <button type="button" id="upgrade-sign-out" class="btn ghost">Use a different account</button>
    </section>
    <section id="app-screen" hidden>
      <div id="tab-home" class="tab-panel" data-tab="home"></div>
      <div id="tab-invoices" class="tab-panel" data-tab="invoices" hidden></div>
      <div id="tab-customers" class="tab-panel" data-tab="customers" hidden></div>
      <div id="tab-settings" class="tab-panel" data-tab="settings" hidden></div>
    </section>
  </main>
  <nav id="bottom-nav" class="bottom-nav" hidden>
    <button data-tab="home" class="active">Home</button>
    <button data-tab="invoices">Invoices</button>
    <button data-tab="customers">Customers</button>
    <button data-tab="settings">Settings</button>
  </nav>
  <button id="fab" class="fab" hidden aria-label="Add">+</button>
  <script type="module">
    import("./js/app.js").catch((err) => {
      const msg = document.getElementById("gate-message");
      if (msg) {
        msg.textContent =
          "App failed to load. Close and reopen the app, or tap Reset session and try again.";
        msg.className = "error-text";
      }
      console.error("FrogsWork boot failed:", err);
    });
  </script>
</body>
</html>
