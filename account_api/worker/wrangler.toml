name = "frogswork-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Custom domain api.frogswork.com must be moved to this Worker in the Cloudflare
# dashboard (Workers & Pages) — it is currently on an older Worker/script.

# Replace placeholder after: .\scripts\setup-d1-production.ps1
# Or: npx wrangler d1 create frogswork-account  (paste uuid below)
[[d1_databases]]
binding = "DB"
database_name = "frogswork-account"
database_id = "2d4c5469-d281-492b-b067-4ffd72e926d8"

[vars]
CLIENT_RELEASE_VERSION = "3.1.2"
CLIENT_RELEASE_URL = "https://downloads.frogswork.com/FrogsWork-3.1.2-win64.zip"
CLIENT_RELEASE_SHA256 = "ba82ac38fdaba2d909a203a53674137f25ea2f816f708165268e0fe108f38e03"
CLIENT_RELEASE_NOTES = "Uninstall downloads the same Cloud data ZIP as Settings (quotes and invoices). Desktop shell keeps a signed-in session for that export."
EMAIL_PROVIDER = "resend"
R2_BUCKET_NAME = "frogswork-invoicer-releases"
CHECKOUT_RETURN_BASE = "https://frogswork.com"
# Set after running account_api/dev/setup_stripe_prices.py
STRIPE_PRICE_LOCAL_MONTHLY = "price_1TsQrHIQSiAlmwTls77JFsYD"
STRIPE_PRICE_LOCAL_ANNUAL = "price_1TsQrJIQSiAlmwTlZoakYvBO"
STRIPE_PRICE_CLOUD_MONTHLY = "price_1TsQrLIQSiAlmwTlK7szQkcV"
STRIPE_PRICE_CLOUD_ANNUAL = "price_1TuaDvIQSiAlmwTlImRCxYtL"

[triggers]
crons = ["0 4 * * *"]

[[r2_buckets]]
binding = "RELEASES"
bucket_name = "frogswork-invoicer-releases"

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "frogswork-user-docs"
