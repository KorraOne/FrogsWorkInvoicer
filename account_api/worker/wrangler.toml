name = "frogswork-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Custom domain api.frogswork.com must be moved to this Worker in the Cloudflare
# dashboard (Workers & Pages) — it is currently on an older Worker/script.

# Replace placeholder after: .\scripts\setup-d1-production.ps1
# Or: npx wrangler d1 create frogswork-account  (paste uuid below)
[[d1_databases]]
binding = "DB"
database_name = "frogswork-account"
database_id = "2d4c5469-d281-492b-b067-4ffd72e926d8"

[vars]
CLIENT_RELEASE_VERSION = "2.2.5"
CLIENT_RELEASE_URL = "https://downloads.frogswork.com/FrogsWork-2.2.5-win64.zip"
CLIENT_RELEASE_SHA256 = "cd2ad40088a80bbf06918b629dca641746725d8e8ec7c86649eea36591af8f75"
CLIENT_RELEASE_NOTES = "Add your business logo to invoices: upload an image, position it with a live header preview, and show it on PDF invoices. Toggle the logo on or off anytime."
