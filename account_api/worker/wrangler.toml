name = "frogswork-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Custom domain api.frogswork.com must be moved to this Worker in the Cloudflare
# dashboard (Workers & Pages) — it is currently on an older Worker/script.

# Replace placeholder after: .\scripts\setup-d1-production.ps1
# Or: npx wrangler d1 create frogswork-account  (paste uuid below)
[[d1_databases]]
binding = "DB"
database_name = "frogswork-account"
database_id = "2d4c5469-d281-492b-b067-4ffd72e926d8"

[vars]
CLIENT_RELEASE_VERSION = "2.2.4"
CLIENT_RELEASE_URL = "https://downloads.frogswork.com/FrogsWork-2.2.4-win64.zip"
CLIENT_RELEASE_SHA256 = "45881123b970468e79db71f68273e30821674117069bdefb436086591b6a3485"
CLIENT_RELEASE_NOTES = "Field validation, normalisation, cleaning; structured addresses; optional invoice logo; work-completed photos appendix; and post-save redirect to Home."
