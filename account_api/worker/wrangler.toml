name = "frogswork-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Custom domain api.frogswork.com must be moved to this Worker in the Cloudflare
# dashboard (Workers & Pages) — it is currently on an older Worker/script.

# Replace placeholder after: .\scripts\setup-d1-production.ps1
# Or: npx wrangler d1 create frogswork-account  (paste uuid below)
[[d1_databases]]
binding = "DB"
database_name = "frogswork-account"
database_id = "2d4c5469-d281-492b-b067-4ffd72e926d8"

[vars]
CLIENT_RELEASE_VERSION = "2.2.9"
CLIENT_RELEASE_URL = "https://downloads.frogswork.com/FrogsWork-2.2.9-win64.zip"
CLIENT_RELEASE_SHA256 = "8837a66c18b834792d7b06bcea743e1cc2f588394b2f96d0745ab3aef6820c9d"
CLIENT_RELEASE_NOTES = "Logo size on PDFs matches the placement preview. Dashboard shows this-month and outstanding/paid totals with GST clearly labelled. Warn before leaving unsaved business or customer details. User-test guide: Greenfield Cafe is your business; Riverside Office is the customer."
R2_BUCKET_NAME = "frogswork-invoicer-releases"

[[r2_buckets]]
binding = "RELEASES"
bucket_name = "frogswork-invoicer-releases"
