name = "frogswork-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Custom domain api.frogswork.com must be moved to this Worker in the Cloudflare
# dashboard (Workers & Pages) — it is currently on an older Worker/script.

# Replace placeholder after: .\scripts\setup-d1-production.ps1
# Or: npx wrangler d1 create frogswork-account  (paste uuid below)
[[d1_databases]]
binding = "DB"
database_name = "frogswork-account"
database_id = "2d4c5469-d281-492b-b067-4ffd72e926d8"

[vars]
CLIENT_RELEASE_VERSION = "2.2.8"
CLIENT_RELEASE_URL = "https://downloads.frogswork.com/FrogsWork-2.2.8-win64.zip"
CLIENT_RELEASE_SHA256 = "2aace7939cf86aa93f03e5ea624a6baa46250b634395c3445d2319671234a873"
CLIENT_RELEASE_NOTES = "GST line items: per-line GST applicable or GST-free toggle (default on); unit prices always ex GST. Fix GST tax invoice line table full width."
