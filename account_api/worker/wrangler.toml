name = "frogswork-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Custom domain api.frogswork.com must be moved to this Worker in the Cloudflare
# dashboard (Workers & Pages) — it is currently on an older Worker/script.

# Replace placeholder after: .\scripts\setup-d1-production.ps1
# Or: npx wrangler d1 create frogswork-account  (paste uuid below)
[[d1_databases]]
binding = "DB"
database_name = "frogswork-account"
database_id = "2d4c5469-d281-492b-b067-4ffd72e926d8"

[vars]
CLIENT_RELEASE_VERSION = "2.2.2"
CLIENT_RELEASE_URL = "https://downloads.frogswork.com/FrogsWork-2.2.2-win64.zip"
CLIENT_RELEASE_SHA256 = "7b8d66803a5ad25947c7efcfa84e17bbdffb382500e2961b42b5a0addbb35b81"
CLIENT_RELEASE_NOTES = "Fix sign-in page copy; subscription model wording."
