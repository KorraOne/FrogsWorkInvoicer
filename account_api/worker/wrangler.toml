name = "frogswork-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Custom domain api.frogswork.com must be moved to this Worker in the Cloudflare
# dashboard (Workers & Pages) — it is currently on an older Worker/script.

# Replace placeholder after: .\scripts\setup-d1-production.ps1
# Or: npx wrangler d1 create frogswork-account  (paste uuid below)
[[d1_databases]]
binding = "DB"
database_name = "frogswork-account"
database_id = "2d4c5469-d281-492b-b067-4ffd72e926d8"

[vars]
CLIENT_RELEASE_VERSION = "2.2.15"
CLIENT_RELEASE_URL = "https://downloads.frogswork.com/FrogsWork-2.2.15-win64.zip"
CLIENT_RELEASE_SHA256 = "6d309475aa8c5e6ce7bf6f8df227ee9ee41ca2d246d39666b62ab645d636c204"
CLIENT_RELEASE_NOTES = "Fix logo placement editor height: meta minimum, dynamic slot, top-aligned bake matching PDF crop."
R2_BUCKET_NAME = "frogswork-invoicer-releases"

[[r2_buckets]]
binding = "RELEASES"
bucket_name = "frogswork-invoicer-releases"
