{% if show_update_banner and pending_update %}
<div class="update-banner" role="status">
    <p class="update-banner-text">
        <strong>Update available:</strong> version {{ pending_update.version }} is ready.
        {% if pending_update.notes %}{{ pending_update.notes }}{% endif %}
    </p>
    <div class="update-banner-actions">
        <form method="POST" action="{{ url_for('updates_apply') }}" class="update-banner-form">
            <button type="submit" class="btn btn-primary btn-sm">Update now</button>
        </form>
        <form method="POST" action="{{ url_for('updates_dismiss') }}" class="update-banner-form">
            <input type="hidden" name="version" value="{{ pending_update.version }}">
            <button type="submit" class="btn btn-secondary btn-sm">Not now</button>
        </form>
        <a href="{{ url_for('settings_updates') }}" class="update-banner-link">Details</a>
    </div>
</div>
{% endif %}
