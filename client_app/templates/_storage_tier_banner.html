{% if local_tier_banner %}
<div class="subscription-sync-banner" role="status">
    <p>{{ local_tier_banner }}</p>
    {% if show_cloud_upgrade_cta %}
    <a href="{{ web_account_upgrade_cloud_url }}" class="btn btn-secondary btn-small" target="_blank" rel="noopener noreferrer">Upgrade to Cloud</a>
    {% endif %}
    {% if show_cloud_migrate_cta %}
    <a href="{{ url_for('settings_cloud_migrate') }}" class="btn btn-secondary btn-small">Migrate data to Cloud</a>
    {% endif %}
</div>
{% endif %}
{% if cloud_sync_pending %}
<div class="subscription-sync-banner" role="status">
    <p>{{ cloud_sync_pending }}</p>
</div>
{% endif %}
