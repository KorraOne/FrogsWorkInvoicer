{% extends "base.html" %}
{% block title %}Cap settings · {{ brand_name }}{% endblock %}
{% block content %}
<h1>Monthly cap</h1>
<p class="home-intro">Warn before you generate an invoice over your limit.</p>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST">
    <section class="billing-section">
        {% set cap_on = cap_enabled %}
        {% include "_cap_choice.html" %}
    </section>
    <button type="submit" class="btn btn-primary">Save</button>
</form>
<script src="{{ url_for('static', filename='billing_ui.js') }}"></script>
{% endblock %}
