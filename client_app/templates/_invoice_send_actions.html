<div class="invoice-send-actions{% if show_send_later|default(false) %} invoice-send-actions-pair{% else %} invoice-send-actions-inline{% endif %}">
    <a href="{{ url_for('invoice_send', number=invoice_number, next=next_page|default('invoices')) }}" class="btn btn-primary btn-small">Prepare to send</a>
    {% if show_send_later|default(false) %}
    <a href="{{ url_for('invoice_send_later', number=invoice_number, next=next_page|default('invoices')) }}" class="btn btn-secondary btn-small">I'll send this later</a>
    {% endif %}
</div>
