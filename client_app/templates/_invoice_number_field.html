<div class="invoice-number-edit" id="invoice-number-edit">
    <div class="invoice-number-display" id="invoice-number-display">
        <div class="invoice-number-display-text">
            <span class="invoice-number-label">Invoice number</span>
            <span class="invoice-number-value" id="invoice-number-value">{{ invoice_number_display }}</span>
        </div>
        <button type="button" class="btn btn-secondary btn-small" id="invoice-number-change-btn">Change</button>
    </div>
    <div class="invoice-number-form" id="invoice-number-form" hidden>
        <div class="form-group invoice-number-form-field">
            <label for="invoice_number_input">Invoice number</label>
            <input type="number" id="invoice_number_input" min="1" value="{{ invoice_number_raw }}">
        </div>
        <div class="invoice-number-form-actions">
            <button type="button" class="btn btn-primary btn-small" id="invoice-number-save-btn">Use this number</button>
            <button type="button" class="btn btn-secondary btn-small" id="invoice-number-cancel-btn">Cancel</button>
        </div>
    </div>
    <input type="hidden" name="invoice_number" id="invoice_number" value="{{ invoice_number_raw }}">
</div>
