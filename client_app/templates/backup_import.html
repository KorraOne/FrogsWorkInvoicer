{% extends "base.html" %}
{% block title %}Backup · {{ brand_name }}{% endblock %}
{% block content %}
<h1>Backup &amp; Restore</h1>
<a href="{{ url_for('backup_export') }}" class="btn btn-primary">Download backup (ZIP)</a>
<h2>Restore from backup</h2>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST" enctype="multipart/form-data" action="{{ url_for('backup_import') }}">
    <div class="form-group">
        <label for="backup_file">Backup ZIP</label>
        <input type="file" name="backup_file" id="backup_file" accept=".zip" required>
    </div>
    <button type="submit" class="btn btn-secondary">Restore</button>
</form>
<p class="home-intro">Restore replaces AppData files and copies PDFs into your folders.</p>
{% endblock %}
