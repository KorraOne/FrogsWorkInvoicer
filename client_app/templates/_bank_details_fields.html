<fieldset class="form-fields-group bank-fields-group">
    <legend class="form-fields-legend">Bank details</legend>
    <div class="form-fields-inner">
        <div class="settings-details-grid">
            <div class="form-group">
                <label for="bsb">BSB</label>
                <input type="text" name="bsb" id="bsb" value="{{ form.bsb|default('') }}" placeholder="{{ ph.bank_bsb }}">
            </div>
            <div class="form-group">
                <label for="acc">Account number</label>
                <input type="text" name="acc" id="acc" value="{{ form.acc|default('') }}" placeholder="{{ ph.bank_account_number }}">
            </div>
        </div>
        <div class="form-group">
            <label for="account_name">Account name</label>
            <input type="text" name="account_name" id="account_name" value="{{ form.account_name|default('') }}" placeholder="{{ ph.bank_account_name }}">
        </div>
    </div>
</fieldset>
