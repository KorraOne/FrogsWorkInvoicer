<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · FrogsWork</title>
    <meta name="description" content="Sign in to your FrogsWork account.">
    <link rel="icon" href="/assets/brand/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a class="site-brand" href="/">
                <img class="site-brand-logo" src="/assets/brand/favicon-32.png" alt="" width="32" height="32">
                FrogsWork
            </a>
            <button class="site-nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
            <nav class="site-nav" id="site-nav" aria-label="Main">
                <a href="/">Home</a>
                <a href="/pricing.html">Pricing</a>
                <a href="/download.html">Download</a>
                <a href="/support.html">Support</a>
            </nav>
        </div>
    </header>

    <main class="site-main account-main account-main--narrow">
        <h1 class="section-heading">Sign in</h1>
        <p class="section-lead">Use the email from your Stripe subscription. After the free trial, an active subscription is required to keep creating invoices.</p>

        <form id="login-form" class="account-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
                <p class="form-hint"><a href="/account/forgot-password.html">Forgot password?</a></p>
            </div>
            <p id="login-error" class="account-error" hidden></p>
            <button type="submit" class="btn btn-primary">Sign in</button>
        </form>

        <p class="form-footer">No account yet? <a href="/account/signup.html">Create account</a></p>
    </main>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <span>FrogsWork by <a href="https://korraone.com" rel="noopener noreferrer">KorraOne</a></span>
            <div class="footer-links">
                <a href="/privacy.html">Privacy</a>
                <a href="/terms.html">Terms</a>
                <a href="/support.html">Support</a>
            </div>
        </div>
    </footer>
    <script src="/js/site.js"></script>
    <script type="module" src="/js/account/login.js"></script>
</body>
</html>
