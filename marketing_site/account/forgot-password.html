<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password · FrogsWork</title>
    <link rel="icon" href="/assets/brand/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a class="site-brand" href="/">
                <img class="site-brand-logo" src="/assets/brand/favicon-32.png" alt="" width="32" height="32">
                FrogsWork
            </a>
        </div>
    </header>
    <main class="site-main account-main account-main--narrow">
        <h1 class="section-heading">Forgot password</h1>
        <p class="section-lead">Enter your account email. If it is registered, we will send reset instructions.</p>
        <form id="forgot-form" class="account-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <p id="forgot-message" class="account-error" hidden></p>
            <button type="submit" class="btn btn-primary">Send reset link</button>
        </form>
        <p class="form-footer"><a href="/account/login.html">Back to sign in</a></p>
    </main>
    <script src="/js/analytics-config.js"></script>
    <script src="/js/analytics.js"></script>
    <script type="module" src="/js/account/forgot-password.js"></script>
</body>
</html>
