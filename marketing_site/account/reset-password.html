<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password · FrogsWork</title>
    <link rel="icon" href="/assets/brand/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a class="site-brand" href="/">
                <img class="site-brand-logo" src="/assets/brand/favicon-32.png" alt="" width="32" height="32">
                FrogsWork
            </a>
        </div>
    </header>
    <main class="site-main account-main account-main--narrow">
        <h1 class="section-heading">Reset password</h1>
        <p class="section-lead">Choose a new password for your account.</p>
        <form id="reset-form" class="account-form">
            <div class="form-group">
                <label for="password">New password</label>
                <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="password2">Confirm password</label>
                <input type="password" id="password2" name="password2" required minlength="8" autocomplete="new-password">
            </div>
            <p id="reset-message" class="account-error" hidden></p>
            <button type="submit" class="btn btn-primary">Update password</button>
        </form>
        <p class="form-footer"><a href="/account/login.html">Sign in</a></p>
    </main>
    <script type="module" src="/js/account/reset-password.js"></script>
</body>
</html>
