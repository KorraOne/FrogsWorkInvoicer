<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account · FrogsWork</title>
    <meta name="description" content="Create your FrogsWork account, then subscribe to Cloud.">
    <link rel="icon" href="/assets/brand/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a class="site-brand" href="/">
                <img class="site-brand-logo" src="/assets/brand/favicon-32.png" alt="" width="32" height="32">
                FrogsWork
            </a>
            <button class="site-nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
            <nav class="site-nav" id="site-nav" aria-label="Main">
                <a href="/">Home</a>
                <a href="/pricing.html">Pricing</a>
                <a href="/download.html">Download</a>
            </nav>
        </div>
    </header>

    <main class="site-main account-main account-main--narrow">
        <div class="account-stepper" aria-label="Progress">
            <span class="account-step account-step--active">1. Create account</span>
            <span class="account-step">2. Choose plan</span>
            <span class="account-step">3. Pay</span>
        </div>

        <h1 class="section-heading">Create your account</h1>
        <p class="section-lead">Enter your email and password first. You will subscribe on the next step. No card required yet.</p>

        <form class="account-form" id="signup-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
                <p class="form-hint">At least 8 characters</p>
            </div>
            <div class="form-group">
                <label for="password_confirm">Confirm password</label>
                <input type="password" id="password_confirm" name="password_confirm" required minlength="8" autocomplete="new-password">
            </div>
            <label class="account-terms">
                <input type="checkbox" name="accept_terms" value="1" required>
                I agree to the <a href="/terms.html" target="_blank" rel="noopener noreferrer">Terms</a>
                and <a href="/privacy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
            </label>
            <p id="signup-error" class="account-error" hidden></p>
            <button type="submit" class="btn btn-primary">Continue to plans</button>
        </form>

        <p class="form-footer">Already have an account? <a href="/account/login.html">Sign in</a></p>
    </main>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <span>FrogsWork by <a href="https://korraone.com" rel="noopener noreferrer">KorraOne</a></span>
        </div>
    </footer>
    <script src="/js/site.js"></script>
    <script type="module" src="/js/account/signup.js"></script>
</body>
</html>
