<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription successful · FrogsWork</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a class="site-brand" href="/">FrogsWork</a>
        </div>
    </header>
    <main class="site-main">
        <h1>Payment received</h1>
        <p class="section-lead">Return to FrogsWork and paste the session ID below to finish account setup.</p>
        <div class="panel" id="session-panel" hidden>
            <p><strong>Your session ID</strong></p>
            <p><code id="session-id" style="word-break:break-all;"></code></p>
            <button type="button" class="btn btn-secondary" id="copy-session">Copy session ID</button>
        </div>
        <p id="session-missing" class="form-hint">If you do not see a session ID here, check the page URL for <code>session_id=cs_test_…</code>.</p>
        <p><a class="btn btn-primary" href="/download.html">Back to download</a></p>
    </main>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var id = params.get("session_id");
            if (!id) return;
            document.getElementById("session-panel").hidden = false;
            document.getElementById("session-missing").hidden = true;
            document.getElementById("session-id").textContent = id;
            document.getElementById("copy-session").addEventListener("click", function () {
                navigator.clipboard.writeText(id);
                this.textContent = "Copied";
            });
        })();
    </script>
</body>
</html>
