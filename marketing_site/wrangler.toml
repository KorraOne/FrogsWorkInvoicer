# Cloudflare Workers static assets — marketing site (frogswork.com)
# Deploy prod: cd marketing_site && npx wrangler deploy
# Preview (separate Worker, not frogswork.com): npx wrangler deploy --env preview
# Dashboard project: frogswork-invoicer

name = "frogswork-invoicer"
main = "src/worker.js"
compatibility_date = "2026-06-28"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[assets]
directory = "."
binding = "ASSETS"
# Do not treat the site as an SPA (avoids serving a stale index for missing paths).
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
run_worker_first = false

# Review-only Worker — does not bind custom domains / frogswork.com
[env.preview]
name = "frogswork-invoicer-preview"

[env.preview.observability]
enabled = true

[env.preview.assets]
directory = "."
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
run_worker_first = false
